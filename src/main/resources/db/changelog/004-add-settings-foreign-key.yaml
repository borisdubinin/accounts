databaseChangeLog:
  - changeSet:
      id: 004-add-settings-foreign-key
      author: borisdubinin
      changes:
        - addColumn:
            tableName: accounts
            columns:
              - column:
                  name: settings_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: accounts
            baseColumnNames: settings_id
            referencedTableName: account_settings
            referencedColumnNames: id
            constraintName: fk_accounts_settings