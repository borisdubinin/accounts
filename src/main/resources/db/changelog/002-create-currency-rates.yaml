databaseChangeLog:
  - changeSet:
      id: 002-create-currency_rates-table
      author: borisdubinin
      changes:
        - createTable:
            tableName: currency_rates
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: scale
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: rate
                  type: DECIMAL(10, 4)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP

        - addUniqueConstraint:
            tableName: currency_rates
            constraintName: unique_currency_per_date
            columnNames: date, currency