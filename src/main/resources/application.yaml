server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://postgres_accounts:5432/accountsdb
    username: postgres
    password: postgres
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

national-bank-client:
  url: https://api.nbrb.by
  currency-rates-endpoint: /exrates/rates

cache:
  configs:
    balance:
      ttl: 30
      maximum-size: 10_000

security:
  users:
    admin:
      username: admin
      password: admin123
      role: ADMIN
    user:
      username: user
      password: user123
      role: USER